# How to reload .tmux.conf => source ~/.tmux.conf
# prefix + r
bind r source-file ~/.tmux.conf

# Keep the themed status bar at the bottom.
# set -g status on
set -g status-position bottom
set -g status on

# Set leader key
unbind C-b
set-option -g prefix C-d

# Set session name length to be longer than default
set -g status-left-length 100
setw -g aggressive-resize on
set -g mode-keys vi
set -g mouse on

# Enable copy by vim yanking visually selected code and adding to OSX clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"

# Copy with unwrapped lines (join wrapped lines, strip leading indentation, keep paragraph breaks)
# Usage: copy-mode select text, then Y (Shift-y)
bind-key -T copy-mode-vi Y send-keys -X copy-pipe "perl -0 -pe 's/(?<!\n)\n(?!\n)/ /g; s/^[ \t]+//gm; s/[ \t]{2,}/ /g; s/\n{3,}/\n\n/g; s/^\n+|\n+$//g; s/^[ \t]+|[ \t]+$//g' | pbcopy"

# Use vim bindings for navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Directory used for new session templates.
set -g @new-session-root "/Users/rianrainey/Documents/code"

# Create a named session with a shell window, then switch to it.
bind-key S command-prompt -p "New session name:" "new-session -d -s '%1' -n shell -c '#{@new-session-root}' \; switch-client -t '%1:shell'"

# Open tmux-sessionizer project picker in a new window.
bind-key -r f run-shell "tmux neww tmux-sessionizer"

# List of plugins
set -g @plugin 'tmux-plugins/tpm' # tmux plugin manager
set -g @plugin 'catppuccin/tmux'
set -g @plugin '2kabhishek/tmux2k'
set -g @tmux2k-theme 'catppuccin'
set -g @tmux2k-icons-only true
set -g @tmux2k-left-plugins "session codex-cost"
set -g @tmux2k-right-plugins "battery"
set -g @tmux2k-codex-cost-colors "text red"
set -g @tmux2k-window-list-format "#I:#W"
set -g @tmux2k-window-list-alignment "right"
#set -g @catppuccin_flavour 'mocha'
#set -g @plugin 'erikw/tmux-powerline'
#set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

run '~/.tmux/plugins/tpm/tpm'

# Catppuccin sets copy-mode selection to a subtle surface color, so override
# it after plugins load.
set -g mode-style "fg=#1e2030,bg=#eed49f,bold"
