# herdr configuration
# Managed with stow — symlinked from dotfiles/herdr/
#
# Tmux-like keyboard shortcuts. Prefix set to Ctrl+d to match tmux config.

[keys]
# Prefix: Ctrl+d (matching ~/.tmux.conf: set-option -g prefix C-d)
prefix = "ctrl+d"

# --- Tmux-like keybindings ---
# Most herdr defaults already mirror tmux. These entries customize
# the differences or add missing tmux bindings.

# Reload config (matches tmux: bind r source-file ~/.tmux.conf)
reload_config = "prefix+r"

# Detach (tmux standard: prefix+d, with Ctrl+d prefix that's Ctrl+d then d)
detach = "prefix+d"

# Rename workspace (tmux: prefix+$ — rename session)
rename_workspace = "prefix+$"

# Rename tab (tmux: prefix+, — rename window)
rename_tab = "prefix+comma"

# Last pane / workspace toggle (tmux: prefix+; — last pane, prefix+L — last session)
# last_pane tracks the last focused pane across workspaces, so it toggles between two spaces.
last_pane = ["prefix+semicolon", "prefix+shift+l"]

# Goto/open picker (tmux-sessionizer equivalent: prefix+f)
goto = "prefix+f"

# Pane navigation (tmux vim-style: prefix+h/j/k/l — same as herdr defaults)
focus_pane_left  = "prefix+h"
focus_pane_down  = "prefix+j"
focus_pane_up    = "prefix+k"
focus_pane_right = "prefix+l"

# Swap panes (tmux: prefix+{ / prefix+})
swap_pane_left  = "prefix+shift+["   # prefix+{
swap_pane_down  = "prefix+shift+j"
swap_pane_up    = "prefix+shift+k"
swap_pane_right = "prefix+shift+]"  # prefix+}

# Splits (tmux: prefix+" horizontal, prefix+% vertical)
split_horizontal = "prefix+minus"
split_vertical   = "prefix+v"

# Tabs (tmux windows)
new_tab      = "prefix+c"
previous_tab = "prefix+p"
next_tab     = "prefix+n"
switch_tab   = "prefix+1..9"

# Switch to workspace 1-9 (tmux doesn't have this, keeps prefix+1..9 for tabs)
switch_workspace = "prefix+shift+1..9"

# Previous/next workspace (tmux: prefix+( / prefix+))
previous_workspace = "prefix+("
next_workspace     = "prefix+)"

# Close pane (tmux: prefix+x)
close_pane = "prefix+x"

# Copy mode (tmux: prefix+[)
copy_mode = "prefix+["

# Zoom (tmux: prefix+z)
zoom = "prefix+z"

# Help (tmux: prefix+?)
help = "prefix+?"

# Workspace picker (tmux: prefix+w — window list equivalent)
workspace_picker = "prefix+w"

# Navigate-mode: workspace (sidebar) navigation — vim-style j/k
navigate_workspace_up   = "k"
navigate_workspace_down = "j"

# Navigate-mode: pane navigation — h/l for left/right (j/k now for sidebar)
# Use prefix+h/j/k/l for full vim pane navigation from prefix mode.
navigate_pane_left  = "h"
navigate_pane_right = "l"

# --- Theme ---
[theme]
name = "catppuccin"
auto_switch = true

# --- Terminal ---
[terminal]
shell_mode = "auto"
new_cwd = "follow"

# --- UI ---
[ui]
# Sidebar pinned open by default
sidebar_start_collapsed = false
sidebar_width = 28
sidebar_min_width = 20
sidebar_max_width = 40

# Mouse support enabled (like tmux set -g mouse on)
mouse_capture = true
copy_on_select = true
pane_borders = true
pane_gaps = true

# Confirm before closing
confirm_close = true

# Agent ordering
agent_panel_sort = "spaces"

# Sidebar layouts
[ui.sidebar.agents]
row_gap = 0
rows = [
  ["state_icon", "workspace", "tab"],
  ["agent"],
]

[ui.sidebar.spaces]
row_gap = 0
rows = [
  ["state_icon", "workspace"],
  ["branch", "git_status"],
]

# --- Notifications ---
[ui.toast]
delivery = "herdr"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

# --- Scrollback ---
[advanced]
scrollback_limit_bytes = 10000000

# --- Session ---
[session]
resume_agents_on_restore = true

# --- Experimental ---
[experimental]
# Allow agent session restore
pane_history = false
